name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            decision-intelligence-farm/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r decision-intelligence-farm/requirements.txt

      - name: Compile checks
        run: python -m compileall decision-intelligence-farm/src

      - name: Unit tests (full)
        working-directory: decision-intelligence-farm/src
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s . -p 'test_*.py'

      - name: Automation audit snapshot
        run: python decision-intelligence-farm/src/automation_intelligence_audit_cli.py --repo-root . --as-json
